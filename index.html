<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Capital Simulation Engine</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:,">
</head>

<div id="loginSection">
  <h2>Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button id="loginBtn">Login</button>
</div>

<div id="appSection" style="display:none;">


<body>


  <h1>Capital Simulation Engine</h1>

<section class="business-card">

  <h2>Business Model</h2>

  <div class="grid-2">

    <div class="input-card">
      <label>Base Revenue</label>
      <input id="baseRevenue" type="number" placeholder="800000">
    </div>

    <div class="input-card">
      <label>Growth %</label>
      <input id="growthPercent" type="number" placeholder="2">
    </div>

    <div class="input-card">
      <label>Marketing Spend</label>
      <input id="marketingSpend" type="number" placeholder="200000">
    </div>

    <div class="input-card">
      <label>Marketing ROI</label>
      <input id="marketingROI" type="number" placeholder="3">
    </div>

    <div class="input-card">
      <label>Fixed Expenses</label>
      <input id="fixedExpenses" type="number" placeholder="300000">
    </div>

    <div class="input-card">
      <label>Salary</label>
      <input id="salary" type="number" placeholder="200000">
    </div>

    <div class="input-card">
      <label>Inventory %</label>
      <input id="inventoryPercent" type="number" placeholder="40">
    </div>

    <div class="input-card">
      <label>Opening Cash</label>
      <input id="openingCash" type="number" placeholder="500000">
    </div>

  </div>

  <h3 class="section-sub">Campaign Override</h3>

  <div class="grid-2">
    <div class="input-card">
      <label>Month</label>
      <input id="overrideMonth" type="number" placeholder="3">
    </div>

    <div class="input-card">
      <label>Marketing Override</label>
      <input id="overrideAmount" type="number" placeholder="400000">
    </div>
  </div>

  <button id="addOverride" class="small-btn">Add Override</button>

  <ul id="overrideList"></ul>

  <button id="saveConfig" class="primary-btn">Save Business Config</button>

</section>

  <section>
    <h2>Add Bank Loan</h2>
    <input id="bankName" placeholder="Name">
    <input id="bankPrincipal" type="number" placeholder="Principal">
    <input id="bankRate" type="number" placeholder="Annual %">
    <input id="bankEMI" type="number" placeholder="EMI">
    <button id="addBank">Add Bank Loan</button>

    <ul id="bankList"></ul>
  </section>

  <section>
    <h2>Add Private Investor</h2>
    <input id="invName" placeholder="Name">
    <input id="invPrincipal" type="number" placeholder="Principal">
    <input id="invRate" type="number" placeholder="Monthly %">
    <button id="addInvestor">Add Investor</button>

    <ul id="investorList"></ul>
  </section>

  <button id="runSimulation">Run Simulation</button>

  <h2>Projection Output</h2>
  <div id="output"></div>
</div>
<script type="module" src="firebase.js"></script>
<script type="module" src="main.js"></script>
  
</body>
</html>
