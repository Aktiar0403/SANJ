<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Capital Simulation Engine</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:,">
</head>

<div id="loginSection">
  <h2>Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button id="loginBtn">Login</button>
</div>

<div id="appSection" style="display:none;">


<body>


  <h1>Capital Simulation Engine</h1>

 <section>
  <h2>Business Model Configuration</h2>

  <h3>Revenue Model</h3>
  <input id="baseRevenue" type="number" placeholder="Base Revenue">
  <input id="growthPercent" type="number" placeholder="Monthly Growth %">

  <h3>Marketing Model</h3>
  <input id="marketingSpend" type="number" placeholder="Default Marketing Spend">
  <input id="marketingROI" type="number" placeholder="Marketing ROI Multiplier">

  <h3>Campaign Override</h3>
  <input id="overrideMonth" type="number" placeholder="Month Number">
  <input id="overrideAmount" type="number" placeholder="Marketing Spend Override">
  <button id="addOverride">Add Override</button>

  <ul id="overrideList"></ul>

  <h3>Expense Model</h3>
  <input id="fixedExpenses" type="number" placeholder="Fixed Expenses">
  <input id="salary" type="number" placeholder="Salary">
  <input id="inventoryPercent" type="number" placeholder="Inventory % of Revenue">

  <h3>Cash</h3>
  <input id="openingCash" type="number" placeholder="Opening Cash">

  <button id="saveConfig">Save Business Config</button>
</section>

  <section>
    <h2>Add Bank Loan</h2>
    <input id="bankName" placeholder="Name">
    <input id="bankPrincipal" type="number" placeholder="Principal">
    <input id="bankRate" type="number" placeholder="Annual %">
    <input id="bankEMI" type="number" placeholder="EMI">
    <button id="addBank">Add Bank Loan</button>

    <ul id="bankList"></ul>
  </section>

  <section>
    <h2>Add Private Investor</h2>
    <input id="invName" placeholder="Name">
    <input id="invPrincipal" type="number" placeholder="Principal">
    <input id="invRate" type="number" placeholder="Monthly %">
    <button id="addInvestor">Add Investor</button>

    <ul id="investorList"></ul>
  </section>

  <button id="runSimulation">Run Simulation</button>

  <h2>Projection Output</h2>
  <div id="output"></div>
</div>
<script type="module" src="firebase.js"></script>
<script type="module" src="main.js"></script>
  
</body>
</html>
