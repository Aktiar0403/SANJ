<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Business Survival Engine</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<h1>Business Survival Dashboard</h1>

<section class="card">
  <h2>Business Inputs</h2>

  <label>Monthly Revenue (₹)</label>
  <input id="revenue" type="number" value="1250000" />

  <label>Doctor %</label>
  <input id="doctorPercent" type="number" value="32.5" />

  <label>COGS %</label>
  <input id="cogsPercent" type="number" value="16.7" />

  <label>Fixed Salaries & Operating (₹)</label>
  <input id="fixedExpense" type="number" value="290000" />
</section>

<section class="card">
  <h2>Private Investors</h2>
  <div id="privateList"></div>
  <button onclick="addPrivate()">Add Private Investor</button>
</section>
<section class="card">
  <h2>Private Investors – Manual Control</h2>
  <div id="privateContainer"></div>
</section>
<section class="card">
  <h2>Bank Loans</h2>
  <div id="bankList"></div>
  <button onclick="addBank()">Add Bank Loan</button>
</section>

<section class="card">
  <h2>Godfather Investment</h2>
  <label>Godfather Investment Amount (₹)</label>
  <input id="godfatherAmount" type="number" value="0" />
</section>

<section class="card">
  <h2>Results</h2>
  <div id="results"></div>
</section>

<button class="primary" onclick="calculate()">Calculate Survival Outcome</button>

<script src="temp.js"></script>
</body>
</html>
