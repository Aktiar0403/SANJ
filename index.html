<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SANJ Financial Control Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>SANJ Financial Command Center</h1>

<!-- ================= SNAPSHOT ================= -->

<section class="card highlight">
  <h2>Financial Snapshot</h2>
  <div class="grid-4">
    <div class="metric">
      <span>Total Bank Liability</span>
      <h3 id="totalBank"></h3>
    </div>
    <div class="metric">
      <span>Total Personal Liability</span>
      <h3 id="totalPersonal"></h3>
    </div>
    <div class="metric">
      <span>Total Private Liability</span>
      <h3 id="totalPrivate"></h3>
    </div>
    <div class="metric danger">
      <span>Total Monthly Burden</span>
      <h3 id="totalMonthlyBurden"></h3>
    </div>
  </div>
</section>

<!-- ================= LOANS ================= -->

<section class="card">
  <h2>Loans Manager</h2>
  <div id="loanCards"></div>
</section>

<!-- ================= PRIVATE ================= -->

<section class="card">
  <h2>Private Investors Manager</h2>

  <div class="grid-2">

    <input id="piName" placeholder="Name">

    <input id="piPrincipal" type="number" placeholder="Principal">

    <input id="piRate" type="number" placeholder="Monthly %">

    <select id="piType">
      <option value="pressure">Pressure</option>
      <option value="negotiable">Negotiable</option>
      <option value="locked">Locked</option>
    </select>

    <input id="piMinLocked" type="number" placeholder="Min Locked Principal">

    <input id="piSkipUntil" type="number" placeholder="Skip Until Month">

    <input id="piPriority" type="number" placeholder="Priority Level">

  </div>

  <button id="addPrivateInvestor">Add Investor</button>

  <div id="privateCards"></div>

</section>
<!-- ================= INJECTIONS ================= -->

<section class="card">
  <h2>Capital Injection Planner</h2>

  <div class="grid">
    <input id="injectMonth" type="number" placeholder="Month (1-36)">
    <input id="injectAmount" type="number" placeholder="Amount">
    <input id="injectPrivatePercent" type="number" placeholder="% to Private">
    <input id="injectBankPercent" type="number" placeholder="% to Bank">
    <input id="injectBufferPercent" type="number" placeholder="% to Buffer">
  </div>

  <button id="addInjection">Add / Update Injection</button>

  <div id="injectionCards"></div>
</section>

<button class="primary" id="runSim">Run 36 Month Simulation</button>

<section class="card">
  <h2>Projection Dashboard</h2>
  <div id="dashboard"></div>
</section>

<script type="module" src="main.js"></script>
</body>
</html>
