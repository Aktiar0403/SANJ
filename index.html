<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Business Survival Engine</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css" />
</head>

<div id="godfatherSticky">
  <div>
    <strong>Godfather Capital:</strong>
    <span id="gfTotal">₹ 0</span>
  </div>

  <div>
    <strong>Used:</strong>
    <span id="gfUsed">₹ 0</span>
  </div>

  <div>
    <strong>Remaining:</strong>
    <span id="gfRemaining">₹ 0</span>
  </div>
</div>


<body>

<h1>Business Survival Dashboard</h1>

<section class="card">
  <h2>Business Inputs</h2>

  <label>Monthly Revenue (₹LAKHS)</label>
  <input id="revenue" type="number" value="12.5" />

  <label>Doctor %</label>
  <input id="doctorPercent" type="number" value="27.5" />

  <label>COGS %</label>
  <input id="cogsPercent" type="number" value="16.7" />

  <label>Fixed Salaries & Operating (₹)</label>
  <input id="fixedExpense" type="number" value="2.9" />
</section>



<section class="card">
  <h2>Godfather Injection</h2>

<label>Enter Injection Amount (L)</label>
<input type="number" id="godfatherInput" placeholder="e.g. 80">

  <button id="injectBtn" class="primary">
    Confirm Injection
  </button>
</section>



<section class="card">
  <h2>Private Investors</h2>

  <div id="privateSummary"></div>

  <div id="privateContainer"></div>
</section>

<section class="card">
  <h2>Personal Loans</h2>
  <div id="personalLoanContainer"></div>
</section>

<section class="card">
  <h2>Business Loans</h2>
  <div id="businessLoanContainer"></div>
</section>



<button class="primary" id="calculateBtn">
  Calculate Outcome
</button>
<section class="card">
  <h2>Results</h2>
  <div id="results"></div>
</section>

<button id="autoAllocateBtn" class="primary">
Auto Allocate
</button>
<button id="runSim">Run 36 Month Simulation</button>

<script type="module" src="main.js"></script>



<div id="allocationModal" class="modal">
  <div class="modal-content">

    <span class="close-modal" id="closeModal">&times;</span>

    <h3 id="modalTitle"></h3>

    <div class="modal-section">

      <label>Allocate from Godfather (₹)</label>
      <input type="number" id="modalAllocation">

      <button id="modalAddBtn">Confirm Allocation</button>

    </div>

    <hr>

    <label>
      <input type="checkbox" id="negotiationToggle">
      Enable Negotiation
    </label>

    <div id="negotiationFields" style="display:none;">

      <label>New Rate %</label>
      <input type="number" id="modalNewRate">

      <label>Skip Months</label>
      <input type="number" id="modalSkipMonths">

    </div>

  </div>
</div>
</body>
</html>
